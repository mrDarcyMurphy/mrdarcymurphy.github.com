<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shut Up & Work | Mr. Darcy Murphy</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        background-size: 100px 50px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background-image: radial-gradient(
            circle at 100% 150%,
            #777777 24%,
            white 24.5%,
            white 28%,
            #777777 28.5%,
            #777777 36%,
            white 36.5%,
            white 40%,
            transparent 40.5%,
            transparent
          ),
          radial-gradient(
            circle at 0 150%,
            #777777 24%,
            white 24.5%,
            white 28%,
            #777777 28.5%,
            #777777 36%,
            white 36.5%,
            white 40%,
            transparent 40.5%,
            transparent
          ),
          radial-gradient(
            circle at 50% 100%,
            white 10%,
            #777777 10.5%,
            #777777 23%,
            white 23.5%,
            white 30%,
            #777777 30.5%,
            #777777 43%,
            white 43.5%,
            white 50%,
            #777777 50.5%,
            #777777 63%,
            white 63.5%,
            white 71%,
            transparent 71.5%,
            transparent
          ),
          radial-gradient(
            circle at 100% 50%,
            white 5%,
            #777777 5.5%,
            #777777 15%,
            white 15.5%,
            white 20%,
            #777777 20.5%,
            #777777 29%,
            white 29.5%,
            white 34%,
            #777777 34.5%,
            #777777 44%,
            white 44.5%,
            white 49%,
            transparent 49.5%,
            transparent
          ),
          radial-gradient(
            circle at 0 50%,
            white 5%,
            #777777 5.5%,
            #777777 15%,
            white 15.5%,
            white 20%,
            #777777 20.5%,
            #777777 29%,
            white 29.5%,
            white 34%,
            #777777 34.5%,
            #777777 44%,
            white 44.5%,
            white 49%,
            transparent 49.5%,
            transparent
          );
      }
      h1 {
        color: #fff;
        text-shadow: 0px 0px 0 black, 0px 0px 1px black, 0px 0px 2px black,
          -1vh 1vh 0 black, -1.25vh 1.5vh 0 black, -1.5vh 2vh 0 black,
          -1.75vh 2.5vh 0 black;
        font-size: 21vh;
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        text-transform: uppercase;
        transform: skew(-8deg, -5deg);
      }
      h1 span {
        display: block;
      }
      .and {
        font-size: 32px;
        text-shadow: 0px 0px 0 black, 0px 0px 1px black, 0px 0px 2px black,
          -0vh 0vh 0 black, -0.25vh 0.5vh 0 black, -0.5vh 1vh 0 black,
          -0.75vh 1.5vh 0 black;
      }
    </style>
  </head>
  <body>
    <h1>
      <span>Shut Up</span>
      <span class="and">and</span>
      <span>Work</span>
    </h1>
  </body>
</html>
